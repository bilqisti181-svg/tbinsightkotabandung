<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TB Insight Kota Bandung</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background: linear-gradient(to right, #fceabb, #f8b500); }
.section { padding: 40px; }
</style>
</head>

<body>

<div class="container text-center">
<h1>TB Insight Kota Bandung</h1>

<select id="tahun" class="form-control mt-3">
<option value="2020">2020</option>
<option value="2021">2021</option>
<option value="2022">2022</option>
<option value="2023">2023</option>
</select>

<select id="kecamatan" class="form-control mt-3">
<option value="all">Semua Kecamatan</option>
</select>

<canvas id="lineChart" class="mt-4"></canvas>
<canvas id="barChart" class="mt-4"></canvas>
<canvas id="pieChart" class="mt-4"></canvas>

</div>

<script>

// (SCRIPT KAMU YANG TADI — JANGAN DIHAPUS)

fetch('Data TB Kota Bandung Tahun 2020 - 2023.json')
.then(res => res.json())
.then(json => {

const rawData = json.Sheet1.filter(d => d != null);

const tahunSelect = document.getElementById('tahun');
const kecSelect = document.getElementById('kecamatan');

const kecamatanList = [...new Set(rawData.map(d => d["Nama Kecamatan"]))];
kecamatanList.forEach(kec => {
    let opt = document.createElement("option");
    opt.value = kec;
    opt.textContent = kec;
    kecSelect.appendChild(opt);
});

function getFilteredData() {
    let tahun = tahunSelect.value;
    let kec = kecSelect.value;

    return rawData.filter(d => {
        return (tahun == d.Tahun) &&
               (kec == "all" || d["Nama Kecamatan"] == kec);
    });
}

function renderLine() {
    let grouped = {};
    rawData.forEach(d => {
        if (!grouped[d.Tahun]) grouped[d.Tahun] = 0;
        grouped[d.Tahun] += (d["Jumlah Semua Kasus TBC"] || 0);
    });

    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: Object.keys(grouped),
            datasets: [{
                label: 'Total Kasus TBC',
                data: Object.values(grouped)
            }]
        }
    });
}

function renderBar() {
    let data = getFilteredData();
    let grouped = {};

    data.forEach(d => {
        let kec = d["Nama Kecamatan"];
        if (!grouped[kec]) grouped[kec] = 0;
        grouped[kec] += (d["Jumlah Semua Kasus TBC"] || 0);
    });

    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: Object.keys(grouped),
            datasets: [{
                label: 'Kasus',
                data: Object.values(grouped)
            }]
        }
    });
}

function renderPie() {
    let data = getFilteredData();
    let anak = 0;
    let dewasa = 0;

    data.forEach(d => {
        let anakVal = parseInt(d["Kasus TBC Anak 0 - 14 Tahun"]);
        if (!isNaN(anakVal)) anak += anakVal;

        dewasa += (d["Jumlah Semua Kasus TBC"] || 0);
    });

    dewasa = dewasa - anak;

    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: ['Anak', 'Dewasa'],
            datasets: [{
                data: [anak, dewasa]
            }]
        }
    });
}

function renderAll() {
    renderLine();
    renderBar();
    renderPie();
}

renderAll();

tahunSelect.addEventListener('change', renderAll);
kecSelect.addEventListener('change', renderAll);

});

</script>

</body>
</html>
