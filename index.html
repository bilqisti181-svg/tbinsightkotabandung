<section id="hero">

<style>
#hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(135deg, #0d6efd, #20c997);
    color: white;
    position: relative;
    overflow: hidden;
}

/* dekorasi bulat */
#hero::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    top: -100px;
    left: -100px;
}

#hero::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    bottom: -100px;
    right: -100px;
}

.hero-content {
    z-index: 2;
    max-width: 800px;
}

.hero-title {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.5;
}

.hero-sub {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.9;
}

/* tombol */
.hero-btn {
    margin-top: 30px;
    padding: 12px 25px;
    border-radius: 30px;
    background: white;
    color: #0d6efd;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
}
.hero-btn:hover {
    background: #f1f1f1;
}
</style>

<div class="hero-content">
<h1 class="hero-title">
Dashboard Data Kesehatan:<br>
Tuberkulosis (TBC)<br>
di Kota Bandung 2020–2023
</h1>

<p class="hero-sub">
Visualisasi data interaktif untuk memahami kondisi TBC di Kota Bandung
</p>

<a href="#home" class="hero-btn">Lihat Informasi</a>
</div>

</section>
